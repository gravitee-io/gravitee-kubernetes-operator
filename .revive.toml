ignoreGeneratedHeader = false
severity = "warning"
confidence = 0.8
errorCode = 1
warningCode = 1

[rule.blank-imports]
[rule.context-as-argument]
  exclude = ["TEST", "test/**"]
[rule.context-keys-type]
[rule.dot-imports]
  exclude = ["TEST", "test/**"]
[rule.empty-block]
[rule.error-naming]
[rule.error-return]
[rule.error-strings]
[rule.errorf]
[rule.increment-decrement]
  exclude = ["TEST", "test/**"]
[rule.indent-error-flow]
[rule.range]
[rule.receiver-naming]
[rule.redefines-builtin-id]
[rule.superfluous-else]
[rule.time-naming]
[rule.unexported-return]
[rule.unreachable-code]
[rule.var-declaration]
[rule.var-naming]
  disabled = true
[rule.cyclomatic]
  arguments = [30]
[rule.cognitive-complexity]
  arguments = [55]
