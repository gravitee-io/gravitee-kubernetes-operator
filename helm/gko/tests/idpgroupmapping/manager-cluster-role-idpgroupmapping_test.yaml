suite: IDPGroupMapping RBAC rules in manager cluster role
templates:
  - "rbac/manager-cluster-role.yaml"
tests:
  - it: Should have IDPGroupMapping resource permissions
    set:
      manager:
        scope:
          cluster: true
    asserts:
      - contains:
          path: rules
          content:
            apiGroups:
              - gravitee.io
            resources:
              - idpgroupmappings
            verbs:
              - get
              - list
              - update
              - watch
      - contains:
          path: rules
          content:
            apiGroups:
              - gravitee.io
            resources:
              - idpgroupmappings/finalizers
            verbs:
              - update
      - contains:
          path: rules
          content:
            apiGroups:
              - gravitee.io
            resources:
              - idpgroupmappings/status
            verbs:
              - get
              - update
