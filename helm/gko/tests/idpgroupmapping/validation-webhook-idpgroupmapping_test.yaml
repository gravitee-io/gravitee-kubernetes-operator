suite: IDPGroupMapping webhook configuration
templates:
  - "webhook/validation-webhook.yaml"
tests:
  - it: Should have IDPGroupMapping webhook
    asserts:
      - contains:
          path: webhooks
          content:
            name: v1alpha1.gravitee.io.idpgroupmapping
            clientConfig:
              service:
                namespace: NAMESPACE
                name: gko-controller-manager-webhook-service
                path: /validate-gravitee-io-v1alpha1-idpgroupmapping
                port: 9443
            rules:
              - operations:
                  - CREATE
                  - UPDATE
                  - DELETE
                apiGroups:
                  - gravitee.io
                apiVersions:
                  - v1alpha1
                resources:
                  - 'idpgroupmappings'
                scope: '*'
            failurePolicy: Fail
            matchPolicy: Equivalent
            namespaceSelector: {}
            objectSelector: {}
            sideEffects: None
            timeoutSeconds: 10
            admissionReviewVersions:
              - v1

  - it: Should not have IDPGroupMapping webhook when webhooks are disabled
    set:
      manager:
        webhook:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
