---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
    version: "7.0.31"
spec:
  selector:
    app: mongodb
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
      protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: mongodb
    version: "7.0.31"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongodb
        version: "7.0.31"
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0.31-jammy
          ports:
            - containerPort: 27017
              name: mongo
              protocol: TCP
          args:
            - "--noauth"
            - "--wiredTigerCacheSizeGB=0.5"
            - "--bind_ip_all"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: datadir
              mountPath: /data/db
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
      volumes:
        - name: datadir
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi