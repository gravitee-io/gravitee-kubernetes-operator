name: Trigger Test

on:
  schedule:
    - cron: '00 13 * * 1-5'
jobs:
  trigger-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: "Trigger test pipeline"
        run: |
          echo "🧪 Triggering test pipeline"
          npx zx scripts/trigger-test.mjs
