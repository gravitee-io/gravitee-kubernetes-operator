name: Freeze

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Which version should we freeze? (e.g. 4.11.0)"
        required: true
        type: string

jobs:
  freeze:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ inputs.version }}
      CIRCLECI_TOKEN: ${{ secrets.CIRCLECI_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure git identity
        run: |
          git config user.name "gravitee-bot"
          git config user.email "contact@graviteesource.com"
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: "Freeze version ${{ inputs.version }}"
        run: npx zx hack/scripts/freeze.mjs --version ${VERSION}
