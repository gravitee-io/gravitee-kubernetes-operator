workflows:
  pre-merge:
    when:
      equal:
        - none
        - << pipeline.parameters.trigger >>
    jobs:
      - job-install-go-tools:
          name: Install GO tools
      - job-lint-sources:
          name: Lint sources
          requires:
            - Install GO tools
      - job-lint-licenses:
          name: Lint licenses
          requires:
            - Install GO tools
      - job-lint-commits:
          name: Lint commits
      - job-lint-resources:
          name: Lint resources
          requires:
            - Install GO tools
      - job-unit-test:
          name: Run unit tests
          requires:
            - Install GO tools
      - job-integration-test:
          matrix:
            parameters:
              ginkgo-filter:
                - withContext
                - withoutContext
          context: cicd-orchestrator
          requires:
            - Install GO tools
      - job-conformance-test:
          name: Run Conformance Test
          context: cicd-orchestrator
          requires:
            - Install GO tools
      - job-helm-lint:
          name: Lint Helm chart
      - job-helm-test:
          name: Test Helm chart
          requires:
            - Lint Helm chart
      - aquasec/fs_scan:
          context: cicd-orchestrator
          pre-steps:
            - cmd-setup-aqua-scan
  post-merge:
    when:
      equal:
        - none
        - << pipeline.parameters.trigger >>
    jobs:
      - aquasec/fs_scan:
          name: Scan code repository
          context: cicd-orchestrator
          pre-steps:
            - cmd-setup-aqua-scan
          filters:
            branches:
              only:
                - /^[0-9]+\.[0-9]+\.x$/
                - master
                - ci-stage-helm-chart
            tags:
              ignore: /.*/
      - job-stage-image:
          name: Stage Docker image
          context: cicd-orchestrator
          filters:
            branches:
              only:
                - /^[0-9]+\.[0-9]+\.x$/
                - master
                - ci-stage-helm-chart
            tags:
              ignore: /.*/
      - job-stage-helm-chart:
          name: Stage Helm chart
          context: cicd-orchestrator
          filters:
            branches:
              only:
                - /^[0-9]+\.[0-9]+\.x$/
                - master
                - ci-stage-helm-chart
            tags:
              ignore: /.*/
      - job-rollout-operator:
          name: Rollout Operator
          context: cicd-orchestrator
          filters:
            branches:
              only:
                - /^[0-9]+\.[0-9]+\.x$/
                - master
                - ci-stage-helm-chart
            tags:
              ignore: /.*/
          requires:
            - Stage Docker image
            - Stage Helm chart 
      - job-e2e-tests:
          name: Run end to end tests
          context: cicd-orchestrator
          filters:
            branches:
              only:
                - master
          post-steps:
              - slack/notify:
                  channel: C098YUEDMGE
                  event: fail
                  template: basic_fail_1
                  branch_pattern: ".+"
              - slack/notify:
                  channel: C098YUEDMGE
                  event: pass
                  template: basic_success_1
                  branch_pattern: ".+"
      - job-install-go-tools:
          name: Install GO tools (master)
          filters:
            branches:
              only:
                - master
      - job-unit-test:
          name: Run unit tests (master)
          requires:
            - Install GO tools (master)
          filters:
            branches:
              only:
                - master
      - job-integration-test:
          matrix:
            parameters:
              ginkgo-filter:
                - withContext
                - withoutContext
          context: cicd-orchestrator
          requires:
            - Install GO tools (master)
          filters:
            branches:
              only:
                - master
      - job-conformance-test:
          name: Run Conformance Test (master)
          context: cicd-orchestrator
          requires:
            - Install GO tools (master)
          filters:
            branches:
              only:
                - master
      - job-sonarcloud-analysis:
          name: Sonarcloud analysis
          context: cicd-orchestrator
          requires:
            - job-integration-test-withContext
            - job-integration-test-withoutContext
            - Run Conformance Test (master)
            - Run end to end tests
          filters:
            branches:
              only:
                - master

      - aquasec/register_artifact:
          name: Register staged image for scanning
          context: cicd-orchestrator
          filters:
            branches:
              only:
                - /^[0-9]+\.[0-9]+\.x$/
                - master
                - ci-stage-helm-chart
            tags:
              ignore: /.*/
          requires:
            - Stage Docker image
          built_docker_image_file: /tmp/docker-image.txt
          pre-steps:
            - checkout
            - cmd-setup-aqua-scan
            - run:
                name: Store docker image version
                command: |
                  export VERSION="$(npx zx hack/scripts/get-chart-version.mjs)"
