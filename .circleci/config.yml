version: 2.1

orbs:
  gravitee: gravitee-io/gravitee@4.18.1
  kubernetes: circleci/kubernetes@2.0.2
  helm: circleci/helm@3.2.0
  go: circleci/go@3.0.4
  keeper: gravitee-io/keeper@0.7.0
  slack: circleci/slack@5.2.3
  gh: circleci/github-cli@2.7.2
  azure-cli: circleci/azure-cli@1.3.2
  aquasec: gravitee-io/aquasec@1.0.5

parameters:
  go-version:
    type: string
    default: "1.25.5"
  helm-version:
    type: string
    default: "v3.19.4"
  kubernetes-version:
    type: string
    default: "v1.34.1"
  trigger:
    type: enum
    default: none
    enum:
      - test
      - e2e
      - upgrade-e2e
      - rollout-apim
      - release
      - freeze
      - rebase-operatorhub
      - none
  apim-source-branch:
    type: string
    default: ""
    description: |
      The branch that triggered a rollout of APIM on our side. 
      This branch belongs to the APIM repository.
  apim-commit-hash:
    type: string
    default: ""
    description: |
      The commit hash that triggered a roullout of APIM on our side. 
      This commit belongs to the APIM repository.
  release-version:
    type: string
    default: ""
    description: "The version being released when the release trigger is used"
  freeze-version:
    type: string
    default: ""
    description: "The version being frozen when the freeze trigger is used"
  latest:
    type: boolean
    default: false
    description: Is this version the latest version available when the release trigger is used ?
  dry-run:
    type: boolean
    default: true
  notify:
    type: boolean
    default: false

executors:
  azure-cli:
    docker:
      - image: mcr.microsoft.com/azure-cli:2.85.0
    resource_class: small

commands:
  cmd-setup-aqua-scan:
    steps:
      - keeper/env-export:
          secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/API Key
          var-name: AQUA_KEY
      - keeper/env-export:
          secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/Secret
          var-name: AQUA_SECRET
      - keeper/env-export:
          secret-url: keeper://LYg-wdlM5UDzSqFFH6Kyig/field/login
          var-name: AQUA_USERNAME
      - keeper/env-export:
          secret-url: keeper://LYg-wdlM5UDzSqFFH6Kyig/field/password
          var-name: AQUA_PASSWORD
      - keeper/env-export:
          secret-url: keeper://QeHHkvALPob4pgs1hMd9Gw/custom_field/ScannerToken
          var-name: SCANNER_TOKEN
      - keeper/env-export:
          secret-url: keeper://TIlcGPFq4rN5GvgnZb9hng/field/password
          var-name: GITHUB_TOKEN

jobs:
  job-install-go-tools:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - run:
          name: Download go modules
          command: go mod download
      - run:
          name: Install GO tools
          command: make install-go-tools
          no_output_timeout: 30m
      - go/save-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - save_cache:
          key: gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
          paths:
            - /home/circleci/project/bin

  job-lint-sources:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Lint sources
          command: make -j4 lint-sources

  job-lint-licenses:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Lint licenses
          command: make lint-licenses
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-lint-commits:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Install commitlint
          command: npm i @commitlint/config-conventional @commitlint/cli
      - run:
          name: Lint commits
          command: |
            node_modules/.bin/commitlint \
              -x @commitlint/config-conventional \
              --from $(git describe --tags --abbrev=0)

  job-lint-resources:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    resource_class: small
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Check that `make generate` has been executed
          command: |
            make generate
            git diff --quiet HEAD api/
      - run:
          name: Check that `make manifests` has been executed
          command: |
            make manifests
            git diff --quiet HEAD crds
      - run:
          name: Check that `make reference` has been executed
          command: |
            make reference
            git diff --quiet HEAD docs/api/reference.md
      - run:
          name: Check that `make helm-reference` has been executed
          command: |
            make helm-reference
            git diff --quiet HEAD helm/gko/README.md
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-unit-test:
    docker:
      - image: cimg/go:<< pipeline.parameters.go-version >>-node
    steps:
      - checkout
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Run unit tests
          command: |
            UT_ARGS="--cover --coverprofile=cover-unit.out --coverpkg=github.com/gravitee-io/gravitee-kubernetes-operator/... --output-dir=/tmp/junit/reports" \
             make -s unit
      - store_test_results:
          path: /tmp/junit/reports
      - persist_to_workspace:
          root: /tmp/junit/reports
          paths:
            - cover-unit.out
      - store_artifacts:
          path: /tmp/junit/reports/cover-unit.out
          destination: cover-unit.out
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-conformance-test:
    machine:
      image: ubuntu-2204:2024.01.2
      docker_layer_caching: false
    resource_class: large
    steps:
      - checkout
      - go/install:
          version: "<< pipeline.parameters.go-version >>"
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Install GO tools if not cached
          command: make install-go-tools
      - kubernetes/install_kubectl:
          kubectl_version: "<< pipeline.parameters.kubernetes-version >>"
      - helm/install_helm_client:
          version: "<< pipeline.parameters.helm-version >>"
      - run:
          name: Install kind
          command: |
            curl -Lo /tmp/kind https://github.com/kubernetes-sigs/kind/releases/download/v0.29.0/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/
      - gravitee/docker-login:
          registry: graviteeio.azurecr.io
          username: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/login
          password: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/password
      - run:
          name: Start cluster
          command: |
            make start-conformance-cluster
      - run:
          name: Prepare coverage storage
          command: |
            sudo chmod -R 777 /tmp/coverage
      - run:
          name: Create coverage persistent volume
          command:  kubectl apply -f ./test/conformance/coverage.yaml
      - run:
          name: Load gateway image
          command: |
            make kind-load-gateway
      - run:
          name: Install MetalLB
          command: |
            npx zx ./hack/scripts/install-metallb.mjs
      - run:
          name: Build and install the operator
          command: |
            IMG=gko TAG=latest make docker-build-cover \
              && kind load docker-image gko:latest --name gravitee \
              && helm upgrade --install gko helm/gko -n default \
                --set manager.image.repository=gko \
                --set manager.image.tag=latest \
                -f ./test/conformance/operator.values.yaml
      - run:
          name: Wait for operator to be ready
          command: |
            kubectl rollout status deployment/gko-controller-manager -n default --timeout=120s
      - run:
          name: Apply GatewayClassParameters and GatewayClass custom resources
          command: |
            kubectl apply -f ./test/conformance/gateway-class-parameters.yaml
            kubectl apply -f ./test/conformance/gateway-class.yaml
      - run:
          name: Run Gateway API conformance test suites
          command: |
            bin/gotestsum --format=testname --hide-summary=skipped --packages="./test/conformance/kubernetes.io/gateway-api/standard/..." -- -args --gateway-class=gravitee-gateway
      - run:
          name: Scale down operator manager.image.repository
          command: |
            kubectl scale deployment gko-controller-manager -n default --replicas=0
            kubectl wait --for=delete pod -l control-plane=controller-manager
      - run: 
          name: Generate coverage
          command: |
            mkdir -p /tmp/junit/reports
            go tool covdata textfmt  -i=/tmp/coverage -o /tmp/junit/reports/cover-conformance.out
      - persist_to_workspace:
          root: /tmp/junit/reports
          paths:
            - cover-conformance.out
      - store_artifacts:
          path: /tmp/junit/reports/cover-conformance.out
          destination: cover-conformance.out
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-integration-test:
    machine:
      image: ubuntu-2204:2024.01.2
      docker_layer_caching: true
    resource_class: medium
    parameters:
      ginkgo-filter:
        type: enum
        enum:
          - withContext
          - withoutContext
    steps:
      - checkout
      - go/install:
          version: "<< pipeline.parameters.go-version >>"
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - go/load-mod-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - go/load-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Install GO tools if not cached
          command: make install-go-tools
      - kubernetes/install_kubectl:
          kubectl_version: "<< pipeline.parameters.kubernetes-version >>"
      - helm/install_helm_client:
          version: "<< pipeline.parameters.helm-version >>"
      - run:
          name: Install kind
          command: |
            curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/
      - gravitee/docker-login:
          registry: graviteeio.azurecr.io
          username: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/login
          password: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/password
      - run:
          name: Create junit reports directory
          command: mkdir -p "/tmp/junit/reports"
      - when:
          condition:
            equal:
              - withoutContext
              - << parameters.ginkgo-filter >>
          steps:
            - run:
                command: echo 'export APIM_VALUES=values-dbless.yaml' >> $BASH_ENV
      - run:
          name: Start cluster
          no_output_timeout: 30m
          command: make start-cluster
      - run:
          name: Run IT with filter << parameters.ginkgo-filter >>
          no_output_timeout: 30m
          command: |
            export SAFE_RANDOM=true
            export GKO_MANAGER_SILENT_LOG=true
            IT_ARGS="--label-filter=<< parameters.ginkgo-filter >> --flake-attempts=2 --cover --coverprofile=cover-<< parameters.ginkgo-filter >>.out --coverpkg=github.com/gravitee-io/gravitee-kubernetes-operator/... --output-dir=/tmp/junit/reports" make -s it
      - store_test_results:
          path: /tmp/junit/reports
      - persist_to_workspace:
          root: /tmp/junit/reports
          paths:
            - cover-<< parameters.ginkgo-filter >>.out
      - store_artifacts:
          path: /tmp/junit/reports/cover-<< parameters.ginkgo-filter >>.out
          destination: cover-<< parameters.ginkgo-filter >>.out
      - go/save-build-cache:
          checksum: '{{ checksum "/tmp/gomod_checksum.md5" }}'

  job-e2e-tests:
    machine:
      image: ubuntu-2204:2024.01.2
      docker_layer_caching: true
    resource_class: large
    steps:
      - checkout
      - go/install:
          version: "<< pipeline.parameters.go-version >>"
      - run:
          name: Generate cache keys for Go tools
          command: find . -name go.mod -exec md5sum {} \; | sort -k 2 > /tmp/gomod_checksum.md5
      - restore_cache:
          keys:
            - gotools-<< pipeline.parameters.go-version >>-{{ checksum "/tmp/gomod_checksum.md5" }}
      - run:
          name: Install GO tools if not cached
          command: make install-go-tools
      - kubernetes/install_kubectl:
          kubectl_version: "<< pipeline.parameters.kubernetes-version >>"
      - helm/install_helm_client:
          version: "<< pipeline.parameters.helm-version >>"
      - run:
          name: Install kind
          command: |
            curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/
      - gravitee/docker-login:
          registry: graviteeio.azurecr.io
          username: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/login
          password: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/password
      # Must run after docker-login: the gck image preload pulls the APIM
      # master nightlies from graviteeio.azurecr.io.
      - run:
          name: Install gck
          command: |
            go install github.com/gravitee-io-labs/gck@v1.1.1
            echo 'export PATH="$HOME/go/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Start cluster
          command: |
            make start-e2e-cluster
      - run:
          name: Prepare coverage storage
          command: |
            sudo chmod -R 777 /tmp/coverage
      - run:
          name: Create coverage persistent volume
          command: kubectl apply -f ./test/e2e/coverage.yaml
      - run:
          name: Helm install GKO
          command: |
            IMG=gko TAG=latest make docker-build-cover \
              && kind load docker-image gko:latest --name gravitee \
              && helm upgrade --install gko helm/gko -n default \
                --set manager.image.repository=gko \
                --set manager.image.tag=latest \
                -f ./test/e2e/operator.values.yaml
      - run:
          name: Build platform-test CLI
          command: npm --prefix test/platform-test install && npm --prefix test/platform-test run build
      - run:
          name: Install Terraform
          command: |
            curl -fsSL https://releases.hashicorp.com/terraform/1.12.1/terraform_1.12.1_linux_amd64.zip -o /tmp/terraform.zip
            sudo unzip -o /tmp/terraform.zip -d /usr/local/bin/
            terraform version
      - run:
          name: Build Gravitee Terraform provider from source
          # Some e2e tests exercise provider features merged to main but not
          # yet on registry.terraform.io. The script builds the provider from
          # source and stages it into a filesystem mirror that
          # helpers/terraform.ts auto-detects via TF_CLI_CONFIG_FILE.
          # Override the ref via the TF_PROVIDER_REF pipeline env var when a
          # specific commit/tag must be tested instead of main.
          command: |
            bash test/platform-test/scripts/build-tf-provider.sh "${TF_PROVIDER_REF:-main}"
      - run:
          name: Wait for operator to be ready
          command: |
            kubectl rollout status deployment/gko-controller-manager -n default --timeout=120s
      # Export the Xray Cloud API credentials BEFORE the e2e run. keeper/env-export
      # runs on_success, so placing it here (while the pipeline is still green)
      # guarantees the creds are in BASH_ENV for the `when: always` push step below
      # even when the e2e run itself fails.
      - keeper/env-export:
          secret-url: keeper://so8_Jh2tP-AZSbtIYcbBvg/custom_field/CLIENT ID
          var-name: XRAY_CLIENT_ID
      - keeper/env-export:
          secret-url: keeper://so8_Jh2tP-AZSbtIYcbBvg/custom_field/CLIENT SECRET
          var-name: XRAY_CLIENT_SECRET
      - run:
          name: Run Playwright E2E tests
          command: npm --prefix test/platform-test run e2e
      - run:
          name: Scale down operator
          command: |
            kubectl scale deployment gko-controller-manager -n default --replicas=0
            kubectl wait --for=delete pod -l control-plane=controller-manager --timeout=60s
      - run:
          name: Generate coverage
          command: |
            mkdir -p /tmp/junit/reports
            go tool covdata textfmt -i=/tmp/coverage -o /tmp/junit/reports/cover-e2e.out
      - persist_to_workspace:
          root: /tmp/junit/reports
          paths:
            - cover-e2e.out
      - store_test_results:
          path: test/platform-test/playwright-results
      - store_artifacts:
          path: test/platform-test/playwright-results
          destination: playwright-results
      - store_artifacts:
          path: test/platform-test/playwright-report
          destination: playwright-report
      - store_artifacts:
          path: /tmp/junit/reports/cover-e2e.out
          destination: cover-e2e.out
      # Best-effort push of the Playwright JUnit results to Xray Cloud so the
      # "Test Coverage" panel on each linked Jira Test reflects the latest run.
      # See test/platform-test/scripts/xray/README.md for env-var setup. Runs
      # `when: always` so failed test runs still surface their failures in Jira
      # instead of leaving the panel stuck at TO DO. The XRAY_CLIENT_* creds are
      # exported earlier (before the e2e run) by keeper/env-export.
      - run:
          name: Push results to Xray Cloud
          when: always
          command: ./test/platform-test/scripts/xray/push-results.sh
      # Note: store_artifacts can't take `when: always`; if e2e fails this
      # step is skipped — the Test Execution key is still in the build log
      # of the "Push results to Xray Cloud" step above.
      - store_artifacts:
          path: /tmp/xray-test-execution.txt
          destination: xray-test-execution.txt

  job-e2e-upgrade-tests:
    machine:
      image: ubuntu-2204:2024.01.2
      docker_layer_caching: true
    resource_class: large
    steps:
      - checkout
      - go/install:
          version: "<< pipeline.parameters.go-version >>"
      - kubernetes/install_kubectl:
          kubectl_version: "<< pipeline.parameters.kubernetes-version >>"
      - helm/install_helm_client:
          version: "<< pipeline.parameters.helm-version >>"
      - run:
          name: Install kind
          command: |
            curl -Lo /tmp/kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
            chmod +x /tmp/kind
            sudo mv /tmp/kind /usr/local/bin/
      - gravitee/docker-login:
          registry: graviteeio.azurecr.io
          username: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/login
          password: keeper://Q721P2LSOPJ9qiXLuf5AHQ/field/password
      - run:
          name: Install gck
          command: |
            go install github.com/gravitee-io-labs/gck@v1.1.1
            echo 'export PATH="$HOME/go/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Build platform-test CLI
          command: npm --prefix test/platform-test install && npm --prefix test/platform-test run build
      # Export Xray Cloud creds before the run (keeper/env-export runs on_success), so
      # the `when: always` push step below has them even if the survival run fails.
      - keeper/env-export:
          secret-url: keeper://so8_Jh2tP-AZSbtIYcbBvg/custom_field/CLIENT ID
          var-name: XRAY_CLIENT_ID
      - keeper/env-export:
          secret-url: keeper://so8_Jh2tP-AZSbtIYcbBvg/custom_field/CLIENT SECRET
          var-name: XRAY_CLIENT_SECRET
      # Upgrade SURVIVAL check (GKO-2983). Provision resources on the OLD line
      # (RELEASED GKO 4.11 + APIM 4.11), upgrade BOTH the operator (-> branch, built
      # from source) and APIM (-> 4.12) in place, then re-attach to the SAME resources
      # and assert they survived, can still be updated by the new operator, and delete
      # cleanly. Version-matched (operator + APIM together) so CRD field evolution is
      # actually exercised, not just APIM data migration. GKO lane only; bump the
      # version pair + the released-GKO pin per release.
      #
      # The branch operator is built from source (helm/gko chart + local image), which
      # is why the kubectl/helm/kind installs above stay (the suite also shells kubectl).
      - run:
          name: Upgrade survival e2e (GKO 4.11 -> branch, APIM 4.11 -> 4.12)
          command: |
            set -e
            # Retry gck's registry fetch (transient gravitee-io-labs.github.io DNS blips).
            retry() { for i in 1 2 3; do "$@" && return 0; echo "retry $i/3 failed: $*"; sleep 10; done; return 1; }

            # 1. APIM 4.11 + the RELEASED GKO 4.11 (the version-matched old line).
            retry gck create --config test/platform-test/gck.yaml --disable-es --disable-portal \
              --set imagePrefix=graviteeio.azurecr.io --set imageTag=4.11.x-latest \
              --set 'helmVersion=>=4.11.0-0 <4.12.0-0'
            # Install the RELEASED graviteeio/gko chart AND image (not the branch
            # chart), so the before phase matches a real 4.11 install (RBAC, webhooks,
            # Deployment surface) and the upgrade below also exercises the chart change.
            helm repo add graviteeio https://helm.gravitee.io && helm repo update graviteeio
            docker pull graviteeio/kubernetes-operator:4.11.10
            kind load docker-image graviteeio/kubernetes-operator:4.11.10 --name gravitee
            helm upgrade --install gko graviteeio/gko --version 4.11.10 -n default
            kubectl rollout status deployment/gko-controller-manager -n default --timeout=180s
            kubectl wait --for=condition=established crd/apiv4definitions.gravitee.io --timeout=90s

            # 2. Provision the survival resources on the old line; leave them running.
            npm --prefix test/platform-test run e2e:upgrade:before

            # 3. Upgrade BOTH in place: APIM 4.11 -> 4.12 and GKO 4.11 -> branch.
            retry gck patch --config test/platform-test/gck.yaml --name gravitee \
              --set imageTag=4.12.x-latest --set 'helmVersion=>=4.12.0-0 <4.13.0-0'
            IMG=gko TAG=latest make docker-build \
              && kind load docker-image gko:latest --name gravitee \
              && helm upgrade --install gko helm/gko -n default \
                --set manager.image.repository=gko --set manager.image.tag=latest
            kubectl rollout status deployment/gko-controller-manager -n default --timeout=180s

            # 4. Re-attach to the carried-over resources; assert survival, update, delete.
            #    E2E_MAX_VERSION = the NEW line gates the 4.12-only steps (mTLS, V2
            #    subscription) so older target pairs skip them cleanly (GKO-2985).
            E2E_MAX_VERSION=4.12 npm --prefix test/platform-test run e2e:upgrade:after
      - store_test_results:
          path: test/platform-test/playwright-results
      - store_artifacts:
          path: test/platform-test/playwright-results
          destination: playwright-results
      - store_artifacts:
          path: test/platform-test/playwright-report
          destination: playwright-report
      # Push the survival after-phase results to Xray Cloud (the @GKO-tagged tests).
      # `when: always` so a failed run still surfaces in Jira. The after-phase is the
      # last `npm run e2e` invocation, so results.xml holds its JUnit.
      - run:
          name: Push results to Xray Cloud
          when: always
          command: ./test/platform-test/scripts/xray/push-results.sh
      - store_artifacts:
          path: /tmp/xray-test-execution.txt
          destination: xray-test-execution.txt

