# GKO-796: Subscription between an API in dev-ctx and an app in e2e-temp-ctx.
apiVersion: gravitee.io/v1alpha1
kind: Subscription
metadata:
  name: e2e-sub-cross-ctx
spec:
  api:
    name: "e2e-v2-jwt-api"
    kind: "ApiDefinition"
  plan: "JWT plan"
  application:
    name: "e2e-app-temp-ctx"
