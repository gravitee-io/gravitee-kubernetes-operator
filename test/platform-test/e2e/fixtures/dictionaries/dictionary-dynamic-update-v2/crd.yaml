# v2 of e2e-dict-dyn-update: same dictionary, provider header value changed
# to "ZYXWVU". Applying this file on top of v1 should cause the operator
# to reconcile the dictionary in APIM and the gateway to expose the new
# value within a few trigger cycles.
apiVersion: gravitee.io/v1alpha1
kind: Dictionary
metadata:
  name: e2e-dict-dyn-update
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-dict-dyn-update"
  description: "DYNAMIC dictionary used to verify update propagation (v2)"
  type: DYNAMIC
  deployed: true
  dynamic:
    provider:
      type: HTTP
      url: "https://api.gravitee.io/echo"
      method: GET
      headers:
        - name: "X-Test-Specific"
          value: "ZYXWVU"
      specification: |
        [
          {
            "operation": "shift",
            "spec": {
              "headers": {
                "*": {
                  "$": "[#2].key",
                  "@": "[#2].value"
                }
              }
            }
          }
        ]
    trigger:
      rate: 5
      unit: SECONDS
