# Same dictionary as dictionary-dynamic-deployed.yaml but with
# `deployed: false`. Applying this after the deployed variant should
# cause the operator to stop polling and undeploy the dictionary while
# leaving the CR in place (no delete, no finalizer release).
apiVersion: gravitee.io/v1alpha1
kind: Dictionary
metadata:
  name: e2e-dict-dyn-deployed
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-dict-dyn-deployed"
  description: "DYNAMIC dictionary in undeployed (stopped) state"
  type: DYNAMIC
  deployed: false
  dynamic:
    provider:
      type: HTTP
      url: "https://api.gravitee.io/echo"
      method: GET
      headers:
        - name: "X-Test-Specific"
          value: "DEPLOYED"
      specification: |
        [
          {
            "operation": "shift",
            "spec": {
              "headers": {
                "*": {
                  "$": "[#2].key",
                  "@": "[#2].value"
                }
              }
            }
          }
        ]
    trigger:
      rate: 5
      unit: SECONDS
