# GKO-2118: clientCertificates entry with both `content` and `ref` set —
# validateClientCertificates rejects with "content and ref cannot both be set".
# This is the closest CRD-side analog to "Forbidden field update": setting
# mutually-exclusive cert sources at the same time.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2118-content-and-ref
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2118-content-and-ref
  description: "E2E test: clientCertificates with both content and ref is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2118-client
    tls:
      clientCertificates:
        - name: dual-source
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
          ref:
            kind: secrets
            name: any-secret
            key: tls.crt
