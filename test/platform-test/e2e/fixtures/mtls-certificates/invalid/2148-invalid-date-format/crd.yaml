# GKO-2148: clientCertificate with invalid date strings — APIM dryRun (or
# CRD schema validation) is expected to reject the malformed RFC3339 strings.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2148-invalid-date
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2148-invalid-date
  description: "E2E test: cert with invalid date format is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2148-client
    tls:
      clientCertificates:
        - name: bad-dates
          startsAt: "not-a-date"
          endsAt: "also-not-a-date"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
