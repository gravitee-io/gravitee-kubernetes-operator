# GKO-2122: clientCertificate with startsAt == endsAt — APIM dryRun is expected
# to reject because the certificate is never valid.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2122-start-eq-end
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2122-start-eq-end
  description: "E2E test: cert with startsAt == endsAt is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2122-client
    tls:
      clientCertificates:
        - name: zero-window
          startsAt: "2026-01-01T00:00:00Z"
          endsAt: "2026-01-01T00:00:00Z"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
