# GKO-2143: clientCertificate with empty `name` field — APIM dryRun is
# expected to reject because cert names are required by the APIM API.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2143-missing-name
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2143-missing-name
  description: "E2E test: cert with empty name is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2143-client
    tls:
      clientCertificates:
        - name: ""
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
