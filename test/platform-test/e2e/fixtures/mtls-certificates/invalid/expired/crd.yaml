# GKO-2131: clientCertificate with both startsAt and endsAt in the past —
# APIM dryRun rejects an already-expired certificate.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2131-expired
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2131-expired
  description: "E2E test: expired certificate is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2131-client
    tls:
      clientCertificates:
        - name: expired-cert
          startsAt: "2020-01-01T00:00:00Z"
          endsAt: "2020-12-31T23:59:59Z"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
