# GKO-2124: clientCertificate with a name exceeding APIM's length limit.
# APIM dryRun is expected to reject the apply with a length-related error.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2124-name-too-long
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2124-name-too-long
  description: "E2E test: cert name exceeds APIM length limit"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2124-client
    tls:
      clientCertificates:
        - name: "this-cert-name-is-deliberately-very-long-and-exceeds-the-fifty-char-limit-imposed-by-apim-on-cert-names"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
