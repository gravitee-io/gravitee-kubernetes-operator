# GKO-2135 / GKO-2148: clientCertificate with endsAt before startsAt — APIM
# dryRun rejects an inverted validity window.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2135-end-before-start
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2135-end-before-start
  description: "E2E test: cert with endsAt before startsAt is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2135-client
    tls:
      clientCertificates:
        - name: inverted-window
          startsAt: "2030-01-01T00:00:00Z"
          endsAt: "2025-01-01T00:00:00Z"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
