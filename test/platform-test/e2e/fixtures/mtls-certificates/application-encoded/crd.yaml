apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-mtls-encoded-app
spec:
  contextRef:
    name: "dev-ctx"
    namespace: default
  name: "e2e-mtls-encoded-app"
  description: "Application with a base64-encoded client certificate"
  settings:
    app:
      type: WEB
    tls:
      clientCertificates:
        - name: client1-encoded
          encoded: true
          content: 
