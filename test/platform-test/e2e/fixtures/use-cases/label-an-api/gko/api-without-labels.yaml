# Use case: the same API as api-with-labels.yaml with the labels stripped;
# re-applying this proves APIM removes the labels (sync-down).
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-uc-label
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-uc-label"
  description: "E2E use-case: label a V4 API"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-uc-label"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
