# Use case: a V4 API that reuses the shared policy group e2e-uc-spg in a request
# flow. The SPG injects X-SPG-Test, which the echo endpoint reflects back.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-uc-spg-api
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-uc-spg-api"
  description: "E2E use-case: V4 API reusing a shared policy group"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-uc-spg-api"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: "Flow with SPG"
      enabled: true
      selectors:
        - type: HTTP
          path: "/"
          pathOperator: STARTS_WITH
      request:
        - name: "SPG step"
          enabled: true
          policy: shared-policy-group-policy
          configuration:
            sharedPolicyGroupId: "{#sharedPolicyGroup['e2e-uc-spg']}"
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
