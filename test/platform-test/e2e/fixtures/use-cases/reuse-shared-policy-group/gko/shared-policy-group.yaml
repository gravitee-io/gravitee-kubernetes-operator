# Use case: a reusable Shared Policy Group (GKO). Its single transform-headers
# step injects X-SPG-Test, which an API that references it runs at request time.
apiVersion: gravitee.io/v1alpha1
kind: SharedPolicyGroup
metadata:
  name: e2e-uc-spg
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-uc-spg"
  description: "E2E use-case: reusable shared policy group"
  apiType: PROXY
  phase: REQUEST
  steps:
    - name: "Transform Headers"
      enabled: true
      policy: transform-headers
      configuration:
        addHeaders:
          - name: "X-SPG-Test"
            value: "spg-header"
