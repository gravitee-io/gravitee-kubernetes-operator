# Use case: update a registered application through GKO. Same application as
# application.yaml, with a changed description; the journey re-applies this to
# prove the update propagates to APIM.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-uc-app-lifecycle
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-uc-app-lifecycle"
  description: "E2E use-case: application updated"
  settings:
    app:
      type: "SIMPLE"
      clientId: "e2e-uc-app-lifecycle-client"
