# Use case: register an application through GKO. This is the "created" state of
# the register-and-retire-application journey; the journey re-applies
# application-updated.yaml to exercise the update, then deletes the CR to retire it.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-uc-app-lifecycle
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-uc-app-lifecycle"
  description: "E2E use-case: application registered"
  settings:
    app:
      type: "SIMPLE"
      clientId: "e2e-uc-app-lifecycle-client"
