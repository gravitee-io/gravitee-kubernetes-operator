# GKO-151: V2 API with a documentation page fetched from an HTTP source.
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-fetcher-page
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-fetcher-page"
  description: "E2E test: V2 API with HTTP-fetched page"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-fetcher-page"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Free plan"
      description: "Open access plan"
      security: KEY_LESS
      status: PUBLISHED
  pages:
    fetched-page:
      name: fetched-page
      type: SWAGGER
      source:
        type: http-fetcher
        configuration:
          url: https://petstore.swagger.io/v2/swagger.json
          autoFetch: false
          useSystemProxy: false
      published: true
