# V2 API with an updated markdown page (used by GKO-146 CRUD flow, GKO-148).
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-markdown-page
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-markdown-page"
  description: "E2E test: V2 API with updated markdown page"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-markdown-page"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Free plan"
      description: "Open access plan"
      security: KEY_LESS
      status: PUBLISHED
  pages:
    markdown-folder:
      name: markdown-folder
      type: FOLDER
      published: true
    markdown-page:
      name: markdown-page
      type: MARKDOWN
      parent: markdown-folder
      content: |
        Hello world (updated)!
        --
        This is V2 markdown with new content.
      visibility: PUBLIC
      published: true
