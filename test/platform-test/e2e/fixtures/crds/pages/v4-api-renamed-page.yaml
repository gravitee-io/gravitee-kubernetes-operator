# GKO-1469: V4 API where the folder and page have been renamed in-place.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-markdown-page
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-v4-markdown-page
  version: "1.0"
  description: "E2E test: V4 API with renamed folder and page"
  type: PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: /e2e-v4-markdown-page
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: Free plan
      description: This plan does not require any authentication
      security:
        type: KEY_LESS
  lifecycleState: PUBLISHED
  pages:
    renamed-folder:
      name: Renamed Folder
      type: FOLDER
      published: true
    renamed-page:
      name: Renamed Page
      type: MARKDOWN
      parent: renamed-folder
      content: |
        Hello from the renamed page.
      visibility: PUBLIC
      published: true
