# GKO-629: V4 HTTP fetcher without required URL field — admission must reject.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-web-no-url
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-v4-web-no-url
  version: "1.0"
  description: "E2E test: V4 web fetcher missing URL"
  type: PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: /e2e-v4-web-no-url
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: Free plan
      security:
        type: KEY_LESS
  lifecycleState: PUBLISHED
  pages:
    broken-fetcher:
      name: broken-fetcher
      type: MARKDOWN
      source:
        type: http-fetcher
        configuration:
          autoFetch: false
      published: true
