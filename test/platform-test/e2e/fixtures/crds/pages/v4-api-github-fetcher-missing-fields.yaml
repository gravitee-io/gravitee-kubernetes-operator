# GKO-636: V4 Github fetcher missing required fields (owner, repository,
# username, personalAccessToken) — admission must reject.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-gh-missing-fields
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-v4-gh-missing-fields
  version: "1.0"
  description: "E2E test: V4 github fetcher missing fields"
  type: PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: /e2e-v4-gh-missing-fields
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: Free plan
      security:
        type: KEY_LESS
  lifecycleState: PUBLISHED
  pages:
    incomplete-github:
      name: incomplete-github
      type: MARKDOWN
      source:
        type: github-fetcher
        configuration:
          filepath: "/README.md"
          branchOrTag: "main"
      published: true
