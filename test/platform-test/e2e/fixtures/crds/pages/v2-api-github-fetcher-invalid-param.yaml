# GKO-623: V2 Github fetcher with an invalid fetchCron — admission must reject.
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-gh-invalid-param
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-gh-invalid-param"
  description: "E2E test: V2 github fetcher invalid cron"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-gh-invalid-param"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Free plan"
      description: "Open access plan"
      security: KEY_LESS
      status: PUBLISHED
  pages:
    gh-bad-cron:
      name: gh-bad-cron
      type: MARKDOWN
      source:
        type: github-fetcher
        configuration:
          owner: "gravitee-io"
          repository: "gravitee-docs"
          username: "gh-user"
          personalAccessToken: "fake-token"
          filepath: "README.md"
          branchOrTag: "main"
          fetchCron: "nope-cron"
          autoFetch: true
