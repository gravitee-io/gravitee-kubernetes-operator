apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-export
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-export"
  description: "E2E test: V2 API for export testing"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-export"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  flows:
    - name: "Add export header"
      enabled: true
      path-operator:
        path: "/"
        operator: STARTS_WITH
      post:
        - name: "Transform Headers"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-E2E-Export-V2"
                value: "true"
  plans:
    - name: "Free plan"
      description: "Open access plan for V2 export testing"
      security: KEY_LESS
      status: PUBLISHED
