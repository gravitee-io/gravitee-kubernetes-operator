apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-msg-kafka
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v4-msg-kafka"
  description: "E2E test: V4 Message API with Kafka endpoint"
  version: "1.0.0"
  type: MESSAGE
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-v4-msg-kafka"
      entrypoints:
        - type: http-get
          qos: AUTO
    - type: SUBSCRIPTION
      entrypoints:
        - type: webhook
          qos: AUTO
  endpointGroups:
    - name: Default Kafka group
      type: kafka
      endpoints:
        - name: Default Kafka endpoint
          type: kafka
          inheritConfiguration: false
          configuration:
            bootstrapServers: "kafka:9092"
            topics:
              - "e2e-topic"
            consumer:
              enabled: true
              autoOffsetReset: earliest
            producer:
              enabled: true
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
