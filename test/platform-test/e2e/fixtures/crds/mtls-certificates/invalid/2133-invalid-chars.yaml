# GKO-2133: clientCertificate name contains characters APIM disallows
# (spaces, path separators, special symbols). APIM dryRun should reject
# the apply.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2133-invalid-chars
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2133-invalid-chars
  description: "E2E test: cert name with invalid characters is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2133-client
    tls:
      clientCertificates:
        - name: "bad/name with spaces&special$chars!"
          content: "-----BEGIN CERTIFICATE-----\nMIIBkTCB+wIJAJ\n-----END CERTIFICATE-----"
