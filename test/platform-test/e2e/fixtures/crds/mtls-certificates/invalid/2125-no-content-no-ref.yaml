# GKO-2125 / GKO-2146: clientCertificates entry with neither `content` nor
# `ref` — validateClientCertificates rejects with "either content or ref
# must be set".
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-2125-no-content-no-ref
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-2125-no-content-no-ref
  description: "E2E test: clientCertificates entry missing content/ref is rejected"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-2125-client
    tls:
      clientCertificates:
        - name: empty-cert
