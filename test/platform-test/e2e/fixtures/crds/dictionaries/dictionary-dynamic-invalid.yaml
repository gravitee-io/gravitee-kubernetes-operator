# Invalid DYNAMIC dictionary: declares type=DYNAMIC but sets the `manual`
# field instead of `dynamic`. Used to verify the admission webhook rejects
# this configuration with a severe error.
apiVersion: gravitee.io/v1alpha1
kind: Dictionary
metadata:
  name: e2e-dict-dyn-invalid
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-dict-dyn-invalid"
  description: "Invalid DYNAMIC with manual field set"
  type: DYNAMIC
  deployed: true
  manual:
    properties:
      key: value
