apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-native-kafka-reporter-disabled
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  # Unique identity (name + Kafka host + broker port range). This fixture used
  # to share spec.name/host/ports with v4-native-kafka-ports-valid.yaml, which
  # mapped both to the same APIM API and made the suite order-dependent.
  name: "e2e-v4-native-kafka-reporter-disabled"
  description: "E2E test: Native Kafka API with reporter metrics disabled"
  version: "1.0.0"
  type: NATIVE
  state: STOPPED
  analytics:
    enabled: true
    reporterMetricsEnabled: false
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: KAFKA
      host: "kafka-reporter.example.local"
      port: 9092
      entrypoints:
        - type: native-kafka
          qos: AUTO
  endpointGroups:
    - name: Default Kafka group
      type: native-kafka
      endpoints:
        - name: Default Kafka endpoint
          type: native-kafka
          inheritConfiguration: false
          configuration:
            bootstrapServers: "kafka-reporter.example.local:9092"
          secondary: false
          sharedConfigurationOverride:
            security:
              protocol: PLAINTEXT

  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
      bootstrapPort: 9292
      brokerRangeStart: 9300
      brokerRangeEnd: 9302

