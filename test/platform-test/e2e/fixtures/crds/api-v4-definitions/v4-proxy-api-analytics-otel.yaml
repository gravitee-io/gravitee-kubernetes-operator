apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-analytics-otel
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v4-analytics-otel"
  description: "E2E test: V4 API analytics otelLogs/reporterMetricsEnabled"
  version: "1.0.0"
  type: PROXY
  state: STOPPED
  analytics:
    enabled: true
    otelLogs:
      enabled: true
    tracing:
      enabled: true
      verbose: true
    logging:
      condition: "{#request.method == 'GET'}"
      mode:
        entrypoint: true
        endpoint: false
      phase:
        request: true
        response: false
      content:
        headers: true
        messageHeaders: false
        payload: false
        messagePayload: false
        messageMetadata: false
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-v4-analytics-otel"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"

