# GKO-180 / GKO-1466: V4 API with visibility=PUBLIC, lifecycleState=UNPUBLISHED.
# UNPUBLISHED APIs should not appear in the developer portal even if visibility
# is PUBLIC.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-public-unpublished
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-v4-public-unpublished
  version: "1.0"
  description: "E2E test: V4 API with visibility PUBLIC and lifecycleState UNPUBLISHED"
  type: PROXY
  state: STARTED
  visibility: PUBLIC
  lifecycleState: UNPUBLISHED
  listeners:
    - type: HTTP
      paths:
        - path: /e2e-v4-public-unpublished
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: Free plan
      security:
        type: KEY_LESS
