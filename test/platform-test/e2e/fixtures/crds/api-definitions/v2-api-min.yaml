# GKO-1448: Minimal viable V2 API to validate V2/V4 compatibility.
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-min
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-min"
  description: "E2E test: minimal V2 API"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-min"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Free plan"
      description: "Open access plan"
      security: KEY_LESS
      status: PUBLISHED
