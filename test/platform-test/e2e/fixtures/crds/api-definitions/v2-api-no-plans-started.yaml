# GKO-606: V2 API with no plans and implicit STARTED state.
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-no-plans-started
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-no-plans-started"
  description: "E2E test: V2 API with no plans (STARTED)"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-no-plans-started"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
