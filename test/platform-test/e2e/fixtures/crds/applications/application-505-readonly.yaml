# GKO-505: Applications deployed via CR should be read-only in APIM & Portal —
# verify by inspecting `origin` (KUBERNETES) on the APIM application record.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-505-readonly
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-505-readonly
  description: "E2E test: applications deployed via CR are read-only in APIM"
  settings:
    app:
      type: SIMPLE
      clientId: e2e-505-client
