# GKO-538: Application with a member referenced by role name.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-with-member
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-app-with-member"
  description: "E2E test: application with a USER member"
  members:
    - source: "gravitee"
      sourceId: "admin"
      role: "USER"
  settings:
    app:
      type: "SIMPLE"
      clientId: "e2e-client-id-with-member"
