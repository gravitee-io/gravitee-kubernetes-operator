# GKO-1465: V4 API in STOPPED state without plans but with flow policies.
# Operator should accept the CRD — policies on plan-less APIs are valid
# as long as the API is not STARTED.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-policy-no-plans
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v4-policy-no-plans"
  description: "E2E test: V4 API with policy but no plans"
  version: "1.0.0"
  type: PROXY
  state: STOPPED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-v4-policy-no-plans"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: "Add header"
      enabled: true
      selectors:
        - type: HTTP
          path: "/"
          pathOperator: STARTS_WITH
      response:
        - name: "Transform Headers"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-E2E-No-Plans"
                value: "true"
