# GKO-1474: Exercise the entrypoint × policy matrix on a V4 Message API.
# Multiple entrypoint types combined with request/response/publish/subscribe
# phase policies, to verify the operator accepts mixed phase definitions.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-entrypoint-policy
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v4-entrypoint-policy"
  description: "E2E test: V4 Message API entrypoint × policy matrix"
  version: "1.0.0"
  type: MESSAGE
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-v4-entrypoint-policy"
      entrypoints:
        - type: http-get
          qos: AUTO
        - type: http-post
          qos: AUTO
        - type: sse
          qos: AUTO
  endpointGroups:
    - name: Default Mock group
      type: mock
      endpoints:
        - name: Default Mock endpoint
          type: mock
          inheritConfiguration: false
          configuration:
            messageInterval: 1000
            messageContent: '{"matrix":"test"}'
            messagesCount: 1
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: "Matrix publish/subscribe"
      enabled: true
      selectors:
        - type: CHANNEL
          channel: "/"
          channelOperator: STARTS_WITH
      publish:
        - name: "Transform Headers (publish)"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-Phase"
                value: "publish"
      subscribe:
        - name: "Transform Headers (subscribe)"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-Phase-Subscribe"
                value: "subscribe"
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
