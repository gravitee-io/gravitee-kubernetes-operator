apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: e2e-v4-invalid-cron
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v4-invalid-cron"
  description: "E2E test: V4 API with invalid cron expression in page fetcher"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/e2e-v4-invalid-cron"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  pages:
    - name: "Fetched Page"
      type: MARKDOWN
      source:
        type: http-fetcher
        configuration:
          fetchCron: "invalid-cron-expression"
          url: "https://example.com/page.md"
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
