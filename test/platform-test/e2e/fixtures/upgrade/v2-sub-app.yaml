# Application that subscribes to the v2-sub-api JWT plan (4.12-only check).
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: v2-sub-app
spec:
  contextRef:
    name: dev-ctx
  name: v2-sub-app
  description: "App for the V2 subscription survival check"
  settings:
    app:
      type: WEB
      clientId: v2-sub-client
