# Same API as api-legacy.yaml, with only the description changed. The after-phase
# re-applies this so the BRANCH operator updates an API the OLD (4.11) operator
# created - the highest-risk moment of an upgrade.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: legacy-api
spec:
  contextRef:
    name: dev-ctx
  definitionContext:
    syncFrom: MANAGEMENT
  name: legacy-api
  version: "1.0"
  type: PROXY
  description: "Legacy API - JWT plan (updated after upgrade)"
  listeners:
    - type: HTTP
      paths:
        - path: "/legacy"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: "Default HTTP proxy group"
      type: "http-proxy"
      endpoints:
        - name: "Default HTTP proxy"
          type: "http-proxy"
          configuration:
            target: "https://api.gravitee.io/echo"
          inheritConfiguration: false
          secondary: false
  analytics:
    enabled: true
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  # Same response policy as api-legacy.yaml - kept here so the post-upgrade
  # description update does not drop the carried-over policy.
  flows:
    - name: "Stamp survivor header"
      enabled: true
      selectors:
        - type: HTTP
          path: "/"
          pathOperator: STARTS_WITH
      response:
        - name: "Transform Headers"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-Upgrade-Survivor"
                value: "legacy-api"
  plans:
    JWT:
      name: "JWT plan"
      description: "Requires a JWT token"
      security:
        type: "JWT"
        configuration:
          signature: "RSA_RS256"
          publicKeyResolver: "GIVEN_KEY"
          resolverParameter: "[[ secret `jwt/public.key` ]]"
          userClaim: "sub"
          clientIdClaim: "client_id"
      status: "PUBLISHED"
