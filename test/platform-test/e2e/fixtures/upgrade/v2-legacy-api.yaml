# A legacy V2 API with a keyless plan, for the upgrade survival check (GKO-1060:
# "V2 APIs still working after upgrade"). Keyless keeps it simple - the gateway
# serves it without a token, so reachability before/after the upgrade is a plain
# 200. V2 APIs work on the 4.11 line (only V2 *subscriptions* are 4.12-only).
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: legacy-v2-api
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: legacy-v2-api
  description: "Legacy V2 API - keyless"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/legacy-v2"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Keyless plan"
      description: "Open access"
      security: KEY_LESS
      status: PUBLISHED
      validation: AUTO
