# Same V2 API as v2-legacy-api.yaml, updated after the upgrade: a changed
# description plus a SECOND context path. The after-phase re-applies this so the
# branch operator updates a V2 API the OLD operator created, and the new path is
# gateway-verifiable (version-agnostic - works on any upgrade pair).
apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: legacy-v2-api
spec:
  contextRef:
    name: dev-ctx
  name: legacy-v2-api
  description: "Legacy V2 API - keyless (updated after upgrade)"
  version: "1.0.0"
  local: false
  proxy:
    virtual_hosts:
      - path: "/legacy-v2"
      - path: "/legacy-v2-updated"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
  plans:
    - name: "Keyless plan"
      description: "Open access"
      security: KEY_LESS
      status: PUBLISHED
      validation: AUTO
