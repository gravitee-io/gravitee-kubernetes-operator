# Subscribes v2-sub-app to the v2-sub-api JWT plan. V2 subscriptions are 4.12-only
# (they go through the Automation API), so this is gated to the after-phase.
apiVersion: gravitee.io/v1alpha1
kind: Subscription
metadata:
  name: v2-sub
spec:
  api:
    name: v2-sub-api
    kind: ApiDefinition
  application:
    name: v2-sub-app
  plan: "JWT plan"
