# Subscribes the carried-over legacy-app to the legacy-api mTLS plan, added in
# the after-phase (mTLS is a 4.12 surface). Matched at the gateway by the app's
# registered client certificate (pki/client1).
apiVersion: gravitee.io/v1alpha1
kind: Subscription
metadata:
  name: legacy-mtls
spec:
  api:
    name: legacy-api
  application:
    name: legacy-app
  plan: MTLS
