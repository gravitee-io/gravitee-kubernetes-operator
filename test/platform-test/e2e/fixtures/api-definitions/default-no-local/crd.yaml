apiVersion: gravitee.io/v1alpha1
kind: ApiDefinition
metadata:
  name: e2e-v2-no-local
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-v2-no-local"
  description: "E2E test: V2 API without local field (should default to false)"
  version: "1.0.0"
  plans:
    - name: "Free plan"
      description: "Default keyless plan"
      security: KEY_LESS
      status: PUBLISHED
  proxy:
    virtual_hosts:
      - path: "/e2e-v2-no-local"
    groups:
      - endpoints:
          - name: Default
            target: https://api.gravitee.io/echo
