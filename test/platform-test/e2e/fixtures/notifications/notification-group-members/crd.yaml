# GKO-1239: Notification CR with groupRefs — group members should be notified
# the same way as if the notification had been configured via the UI.
apiVersion: gravitee.io/v1alpha1
kind: Notification
metadata:
  name: e2e-notification-1239-group-members
spec:
  target: console
  eventType: api
  console:
    apiEvents:
      - API_STARTED
    groupRefs:
      - name: e2e-group-1239-group-members
