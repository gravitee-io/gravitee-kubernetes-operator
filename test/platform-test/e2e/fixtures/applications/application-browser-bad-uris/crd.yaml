# GKO-578: BROWSER application type with INVALID redirectUris (not a URI) —
# admission/dryRun in APIM should reject because BROWSER apps require valid
# absolute URIs in redirectUris.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-578-browser-bad
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: e2e-app-578-browser-bad
  description: "E2E test: BROWSER app with invalid redirectUris"
  settings:
    oauth:
      applicationType: BROWSER
      grantTypes:
        - authorization_code
      redirectUris:
        - "not-a-valid-uri"
