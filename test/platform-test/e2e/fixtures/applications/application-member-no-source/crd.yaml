# GKO-536: Application member missing the `source` field — webhook should
# reject (members require both source and sourceId).
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: e2e-app-member-no-source
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "e2e-app-member-no-source"
  description: "E2E test: application member without a source"
  members:
    - sourceId: "admin"
      role: "USER"
  settings:
    app:
      type: "SIMPLE"
