# A V4 API whose transform-headers flow injects a dictionary property into the
# X-Dict-Env response header. The EL key is the dictionary HRID
# (default-manual-dictionary = namespace "default" + dictionary name).
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: dictionary-consumer-api
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: dictionary-consumer-api
  version: "1.0"
  type: PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: /dictionary-consumer-api
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default
      type: http-proxy
      endpoints:
        - name: echo
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: Add dictionary header
      enabled: true
      selectors:
        - type: HTTP
          path: /
          pathOperator: STARTS_WITH
      request:
        - name: Transform Headers
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: X-Dict-Env
                value: "{#dictionaries['default-manual-dictionary']['env']}"
  plans:
    KeyLess:
      name: Free plan
      security:
        type: KEY_LESS
  analytics:
    enabled: false
