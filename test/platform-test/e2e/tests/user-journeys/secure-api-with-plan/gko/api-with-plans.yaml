# Secure a V4 proxy API with a JWT plan and an OAuth2 plan, through GKO.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: secured-api
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "secured-api"
  description: "V4 proxy API secured with a JWT plan and an OAuth2 plan"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/secured-api"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    JWTPlan:
      name: "JWT plan"
      status: "PUBLISHED"
      security:
        type: "JWT"
      validation: AUTO
    OAuth2Plan:
      name: "OAuth2 plan"
      status: "PUBLISHED"
      security:
        type: "OAUTH2"
      validation: AUTO
