# Publish a V4 proxy API to the portal (PUBLIC + PUBLISHED) and serve traffic
# (STARTED). Re-applying api-stopped.yaml takes it off the gateway; re-applying
# this brings it back.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: published-api
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "published-api"
  description: "V4 proxy API published to the portal, verifying start/stop and gateway reachability"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  visibility: PUBLIC
  lifecycleState: PUBLISHED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/published-api"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: "Free plan"
      description: "This plan does not require any authentication"
      security:
        type: "KEY_LESS"
