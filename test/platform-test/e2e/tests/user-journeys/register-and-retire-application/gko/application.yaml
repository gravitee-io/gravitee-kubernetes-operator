# Register an application through GKO (the "created" state of the
# register/update/retire journey). Re-applying application-updated.yaml exercises
# the update; deleting the CR retires it.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: lifecycle-application
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "lifecycle-application"
  description: "Application registered via the register/update/retire journey"
  settings:
    app:
      type: "SIMPLE"
      clientId: "lifecycle-application-client"
