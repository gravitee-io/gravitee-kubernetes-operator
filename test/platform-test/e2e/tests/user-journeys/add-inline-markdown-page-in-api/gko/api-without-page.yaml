# The same API as api-with-page.yaml with the inline markdown page stripped;
# re-applying this proves GKO removes the page in APIM (sync-down).
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: documented-api
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: "dev-ctx"
    namespace: "default"
  name: "documented-api"
  description: "V4 proxy API documented with an inline markdown page"
  version: "1.0.0"
  type: PROXY
  state: STARTED
  definitionContext:
    origin: KUBERNETES
    syncFrom: MANAGEMENT
  listeners:
    - type: HTTP
      paths:
        - path: "/documented-api"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: "Free plan"
      security:
        type: "KEY_LESS"
