# A V4 API whose transform-headers flow injects a DYNAMIC dictionary property
# into the X-Env response header. The dictionary's HTTP provider polls the echo
# endpoint and a JOLT spec maps the echoed X-Test-Specific header into a
# property of the same name. The EL key is the dictionary HRID
# (default-dyn-dictionary = namespace "default" + dictionary name). The
# dictionary itself is applied by the scenario's applyParams step so its
# provider header value and deployed flag can vary across the lifecycle.
apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: dyn-dictionary-consumer-api
  labels:
    gravitee.io/e2e: "true"
spec:
  contextRef:
    name: dev-ctx
    namespace: default
  name: dyn-dictionary-consumer-api
  version: "1.0"
  type: PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: /dyn-dictionary-consumer-api
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: Add dynamic dictionary header
      enabled: true
      selectors:
        - type: HTTP
          path: /
          pathOperator: STARTS_WITH
      request:
        - name: Transform Headers
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: X-Env
                value: "{#dictionaries['default-dyn-dictionary']['X-Test-Specific']}"
  plans:
    KeyLess:
      name: Free plan
      security:
        type: KEY_LESS
  analytics:
    enabled: false
