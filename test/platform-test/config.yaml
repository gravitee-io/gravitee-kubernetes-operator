# Sample configuration for a local APIM setup (kind / docker-compose).
#
# Endpoints:
#   Gateway             http://localhost:30082
#   Gateway with mTLS   https://localhost:30084
#   Management API      http://localhost:30083
#   Console             http://localhost:30080
#
# Copy this file to the working directory where you run platform-test,
# or pass its path via the --config flag:
#   platform-test assert-api --config /path/to/config.yaml
#
# Environment variable overrides:
#   GRAVITEE_BASE_URL          apim.baseUrl
#   GRAVITEE_ENV_ID            apim.envId
#   GRAVITEE_USERNAME          apim.auth.username
#   GRAVITEE_PASSWORD          apim.auth.password
#   GRAVITEE_GATEWAY_URL       gateway.baseUrl
#   GRAVITEE_GATEWAY_MTLS_URL  gateway.mtlsBaseUrl

apim:
  baseUrl: http://localhost:30083
  envId: DEFAULT
  auth:
    username: admin
    password: admin

gateway:
  baseUrl: http://localhost:30082
  mtlsBaseUrl: https://localhost:30084
