# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: application-multiple-certs
  labels:
    focus: "true"
spec:
  bindings:
    - name: commandDir
      value: "../../../../lib/commands"
    - name: gkoNamespace
      value: default

  ## TODO Retry manually against live cluster
  steps:
    # ========================================================
    # Setup: deploy TLS secrets and ConfigMap
    # ========================================================
    - name: Deploy TLS secrets and ConfigMap
      try:
        - apply:
            file: resources/tls-secrets.yaml
      catch:
        - events: {}
      cleanup:
        - delete:
            file: resources/tls-secrets.yaml

    # ========================================================
    # Test 1: Inline certificates
    # ========================================================
    - name: Deploy Application with inline certs
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-inline.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: Deploy v4 API with MTLS plan
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/api.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: ApiV4Definition
            - name: name
              value: mtls-multi-cert-demo

    - name: Deploy Subscription
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Inline: call gateway without cert, expect 401"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 401 --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)
    - name: "Inline: call gateway with client1 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Inline: call gateway with client2 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # Cleanup inline/rotation subscription before switching to ref app
    - name: Delete subscription for next test
      try:
        - delete:
            file: resources/subscription.yaml
        - delete:
            file: resources/application-rotation.yaml
      catch:
        - events: {}

    # ========================================================
    # Test 2: Certificate rotation (start with client2, add client1)
    # ========================================================
    - name: "Rotation: Create Application with client2"
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-rotation.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: "Rotation: call gateway with removed client1, expect not 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --notStatus 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Rotation: call gateway with remaining client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Rotation: Deploy Application with client1 and client2 certs"
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-inline.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app
    - name: "Rotation: call gateway with client1, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace:
              ($gkoNamespace)
    - name: "Rotation: call gateway with client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # Cleanup inline/rotation subscription before switching to ref app
    - name: Delete subscription for next test
      try:
        - delete:
            file: resources/subscription.yaml
        - delete:
            file: resources/application-rotation.yaml
      catch:
        - events: {}

    # ========================================================
    # Test 3: Certificate refs (Secret + ConfigMap)
    # ========================================================
    - name: Deploy Application with cert refs
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-refs.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: "Refs: check ResolvedRefs condition is True"
      try:
        - assert:
            resource:
              apiVersion: gravitee.io/v1alpha1
              kind: Application
              metadata:
                name: multi-cert-app
              status:
                conditions:
                  - type: ResolvedRefs
                    status: "True"
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager

    - name: Deploy Subscription for refs test
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Refs: call gateway with client1 cert (from Secret), expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Refs: call gateway with client2 cert (from ConfigMap), expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # Cleanup refs subscription
    - name: Delete subscription for next test
      try:
        - delete:
            file: resources/subscription.yaml
        - delete:
            file: resources/application-refs.yaml
      catch:
        - events: {}

    # ========================================================
    # Test 4: Template certificates
    # ========================================================
    - name: Deploy Application with template certs
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-templates.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: Deploy Subscription for templates test
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Templates: call gateway with client1 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # Cleanup templates subscription
    - name: Delete subscription for next test
      try:
        - delete:
            file: resources/subscription.yaml
        - delete:
            file: resources/application-templates.yaml
      catch:
        - events: {}

    # ========================================================
    # Test 5: Backward compatibility (deprecated clientCertificate)
    # ========================================================
    - name: Deploy Application with deprecated clientCertificate
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-backward-compat.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: Deploy Subscription for backward compat test
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Backward compat: call gateway with client1 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Backward compat: Deploy Application with inline certs (adding cert2, set cert1 in the list instead)"
      use:
        template: ../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-inline.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app
    - name: "Backward compat (upgrade): call gateway with client1 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Backward compat (upgrade): call gateway with client2 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-demo --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)
