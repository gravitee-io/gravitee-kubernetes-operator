# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: application-multiple-certs-inline
spec:
  bindings:
    - name: commandDir
      value: "../../../../../lib/commands"
    - name: gkoNamespace
      value: default

  steps:
    # ========================================================
    # Test: Inline certificates
    # ========================================================
    - name: Deploy v4 API with MTLS plan
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/api.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: ApiV4Definition
            - name: name
              value: mtls-multi-cert-inline
    - name: Deploy Application with inline certs
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-inline.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app
    - name: Deploy Subscription
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Inline: call gateway without cert, expect 401"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-inline --status 401 --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)
    - name: "Inline: call gateway with client1 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-inline --status 200 --cert resources/pki/client1.crt --key resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Inline: call gateway with client2 cert, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert-inline --status 200 --cert resources/pki/client2.crt --key resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)
