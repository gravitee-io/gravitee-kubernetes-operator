# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: application-multiple-certs-rotation
spec:
  bindings:
    - name: commandDir
      value: "../../../../../lib/commands"
    - name: gkoNamespace
      value: default

  steps:
    # ========================================================
    # Setup: deploy TLS secrets and ConfigMap
    # ========================================================
    - name: Deploy v4 API with MTLS plan
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: ../resources/api.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: ApiV4Definition
            - name: name
              value: mtls-multi-cert
    # ========================================================
    # Certificate rotation (start with client1, add client2)
    # ========================================================
    - name: "Rotation: Create Application with client1"
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-rotation-step1.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: "Rotation: Deploy Subscription"
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: ../resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Rotation: call gateway with client1, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Rotation: call gateway with client2, expect non 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --notStatus 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Rotation: Deploy Application with client1 and client2 certs"
      try:
        - apply:
            file: resources/application-rotation-step2.yaml
      catch:
        - events: {}
    - name: "Rotation: call gateway with client1, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace:
              ($gkoNamespace)
    - name: "Rotation: call gateway with client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace:
              ($gkoNamespace)
    - name: "Rotation: Deploy Application with client2 certs (remove client 1)"
      try:
        - apply:
            file: resources/application-rotation-step3.yaml
      catch:
        - events: {}
    - name: "Rotation: call gateway with client1, expect non 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --notStatus 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace:
              ($gkoNamespace)
    - name: "Rotation: call gateway with client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace:
              ($gkoNamespace)



