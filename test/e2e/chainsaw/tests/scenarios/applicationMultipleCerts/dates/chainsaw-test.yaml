# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: application-multiple-certs-dates
spec:
  bindings:
    - name: commandDir
      value: "../../../../../lib/commands"
    - name: gkoNamespace
      value: default
    # Dynamic dates computed via chainsaw JMESPath functions (kyverno-json engine).
    # time_now_utc() returns current UTC time, time_add() adds a Go duration.
    # These produce RFC3339 strings usable in resource templates.
    - name: pastDate
      value: (time_add(time_now_utc(), '-8760h'))
    - name: futureDate
      value: (time_add(time_now_utc(), '8760h'))
    - name: expiredDate
      value: (time_add(time_now_utc(), '-24h'))

  steps:
    # ========================================================
    # Setup: deploy TLS secrets + API
    # ========================================================
    - name: Deploy TLS secrets and ConfigMap
      try:
        - apply:
            file: ../resources/tls-secrets.yaml
      catch:
        - events: {}
      cleanup:
        - delete:
            file: ../resources/tls-secrets.yaml

    - name: Deploy v4 API with MTLS plan
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: ../resources/api.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: ApiV4Definition
            - name: name
              value: mtls-multi-cert

    # ========================================================
    # Step 1: Two cert refs with NO names — verify it works
    # ========================================================
    - name: "Dates step1: Deploy Application with 2 refs, no names"
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: resources/application-dates-step1.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Application
            - name: name
              value: multi-cert-app

    - name: Deploy Subscription
      use:
        template: ../../../../stepTemplates/deploy-and-wait.yaml
        with:
          bindings:
            - name: resourceFile
              value: ../resources/subscription.yaml
            - name: apiVersion
              value: gravitee.io/v1alpha1
            - name: kind
              value: Subscription
            - name: name
              value: multi-cert-subscription

    - name: "Dates step1: call gateway with client1, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Dates step1: call gateway with client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # ========================================================
    # Step 2: Update with names + valid dates (past start, future end)
    # Uses chainsaw templating to inject dynamic dates into the resource.
    # ========================================================
    - name: "Dates step2: Update Application with names and valid dates"
      try:
        - apply:
            file: resources/application-dates-step2.yaml
            template: true
      catch:
        - events: {}

    - name: "Dates step2: call gateway with client1, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Dates step2: call gateway with client2, expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    # ========================================================
    # Step 3: Rotation — expire client1 (endsAt in the past)
    # After this, client1 should no longer grant access.
    # ========================================================
    - name: "Dates step3: Update Application with client1 expired"
      try:
        - apply:
            file: resources/application-dates-step3.yaml
            template: true
      catch:
        - events: {}

    - name: "Dates step3: wait for Accepted"
      try:
        - assert:
            resource:
              apiVersion: gravitee.io/v1alpha1
              kind: Application
              metadata:
                name: multi-cert-app

      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager

    - name: "Dates step3: call gateway with client1 (expired), expect non 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --notStatus 200 --cert ../resources/pki/client1.crt --key ../resources/pki/client1.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)

    - name: "Dates step3: call gateway with client2 (still valid), expect 200"
      try:
        - script:
            env:
              - name: COMMAND_DIR
                value: ($commandDir)
            content: |
              npx --yes --quiet zx "$COMMAND_DIR/callGateway.mjs" --endpoint mtls-multi-cert --status 200 --cert ../resources/pki/client2.crt --key ../resources/pki/client2.key --gateway https://localhost:30084
      catch:
        - podLogs:
            selector: "control-plane=controller-manager"
            namespace: ($gkoNamespace)
            container: manager
        - podLogs:
            selector: "app.kubernetes.io/component=gateway"
            namespace: ($gkoNamespace)
