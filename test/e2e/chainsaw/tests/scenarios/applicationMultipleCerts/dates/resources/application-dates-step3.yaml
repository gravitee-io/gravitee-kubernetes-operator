# Step 3: Rotation — client1 expired (endsAt in the past), client2 still valid.
# This file is applied with chainsaw template: true so ($binding) expressions are resolved.
apiVersion: gravitee.io/v1alpha1
kind: Application
metadata:
  name: multi-cert-app
spec:
  contextRef:
    name: "dev-ctx"
    namespace: default
  name: "multi-cert-app"
  description: "Application with client1 expired, client2 still valid"
  settings:
    app:
      type: WEB
    tls:
      clientCertificates:
        - name: client1
          startsAt: ($pastDate)
          endsAt: ($expiredDate)
          ref:
            kind: secrets
            name: tls-client1
            key: tls.crt
        - name: client2
          startsAt: ($expiredDate)
          endsAt: ($futureDate)
          ref:
            kind: configmaps
            name: tls-client2-cm
            key: tls.crt
