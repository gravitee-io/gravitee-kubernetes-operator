---
apiVersion: "gravitee.io/v1alpha1"
kind: "ApiV4Definition"
metadata:
  name: "mtls-multi-cert-refs"
spec:
  definitionContext:
    syncFrom: MANAGEMENT
  contextRef:
    name: dev-ctx
    namespace: default
  name: "mtls-multi-cert-refs"
  version: "1"
  type: "PROXY"
  state: "STARTED"
  description: "MTLS multiple certificates API."
  listeners:
    - type: HTTP
      paths:
        - path: "/mtls-multi-cert-refs"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: "Default HTTP proxy group"
      type: "http-proxy"
      endpoints:
        - name: "Default HTTP proxy"
          type: "http-proxy"
          configuration:
            target: "https://api.gravitee.io/echo"
          inheritConfiguration: false
          secondary: false
  analytics:
    enabled: true
  plans:
    MTLS:
      name: "mtls"
      security:
        type: "MTLS"
      status: PUBLISHED
