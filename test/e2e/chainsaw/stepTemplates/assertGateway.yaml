# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/steptemplate-chainsaw-v1alpha1.json

# Assert a gateway response using the platform-test CLI.
#
# Required bindings:
#   $platformTestCli    - path to platform-test CLI (e.g. ../../platform-test/dist/cmd/cli.js)
#   $platformTestConfig - path to platform-test config.yaml
#   $gatewayPath        - gateway path to assert (e.g. /my-api)
#   $gkoNamespace       - GKO namespace (for catch pod logs)
#
# Provide exactly one of:
#   $expectedStatus     - expected HTTP status code (e.g. 200)
#   $notExpectedStatus  - HTTP status code that must NOT appear (e.g. 200)
#
# Optional bindings:
#   $authorization      - Authorization header value (e.g. 'Bearer <token>')
#   $assertGwExtraArgs  - extra CLI args as a string (e.g. '--timeout 60000')

apiVersion: chainsaw.kyverno.io/v1alpha1
kind: StepTemplate
metadata:
  name: assert-gateway
spec:
  bindings:
    - name: expectedStatus
      value: ""
    - name: notExpectedStatus
      value: ""
    - name: authorization
      value: ""
    - name: assertGwExtraArgs
      value: ""
  try:
    - script:
        env:
          - name: PLATFORM_TEST_CLI
            value: ($platformTestCli)
          - name: PLATFORM_TEST_CONFIG
            value: ($platformTestConfig)
          - name: GATEWAY_PATH
            value: ($gatewayPath)
          - name: EXPECTED_STATUS
            value: ($expectedStatus)
          - name: NOT_EXPECTED_STATUS
            value: ($notExpectedStatus)
          - name: AUTHORIZATION
            value: ($authorization)
          - name: EXTRA_ARGS
            value: ($assertGwExtraArgs)
        content: |
          set -- --config "$PLATFORM_TEST_CONFIG" --path "$GATEWAY_PATH"
          [ -n "$EXPECTED_STATUS" ]     && set -- "$@" --status "$EXPECTED_STATUS"
          [ -n "$NOT_EXPECTED_STATUS" ] && set -- "$@" --not-status "$NOT_EXPECTED_STATUS"
          [ -n "$AUTHORIZATION" ]       && set -- "$@" --authorization "$AUTHORIZATION"
          node "$PLATFORM_TEST_CLI" assert-gateway "$@" $EXTRA_ARGS
  catch:
    - events: {}
    - podLogs:
        selector: "app.kubernetes.io/component=gateway"
        namespace: ($gkoNamespace)
