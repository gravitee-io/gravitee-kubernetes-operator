apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: api-v4-llm-proxy
spec:
  contextRef:
    name: "dev-ctx"
  name: "api-v4-llm-proxy"
  description: "LLM Proxy API"
  version: "1.0"
  type: LLM_PROXY
  state: STARTED
  listeners:
    - type: HTTP
      paths:
        - path: "/llm-proxy"
      entrypoints:
        - type: llm-proxy
          qos: AUTO
  endpointGroups:
    - name: Default LLM proxy group
      type: llm-proxy
      endpoints:
        - name: Default LLM proxy
          type: llm-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.openai.com
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  plans:
    KeyLess:
      name: "Free plan"
      description: "This plan does not require any authentication"
      security:
        type: "KEY_LESS"
  notifyMembers: false
