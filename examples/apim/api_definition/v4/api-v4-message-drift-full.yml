apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: api-v4-message-drift-full
spec:
  contextRef:
    name: "dev-ctx"
  name: "api-v4-message-drift-full"
  description: "V4 Message API with extended fields for drift admission tests"
  version: "1.0"
  type: MESSAGE
  state: STARTED
  tags:
    - message
    - drift
  properties:
    - key: owner
      value: gko
  listeners:
    - type: HTTP
      paths:
        - path: "/api-v4-message-drift-full"
      entrypoints:
        - type: http-get
          qos: AUTO
    - type: SUBSCRIPTION
      entrypoints:
        - type: webhook
          qos: AUTO
  endpointGroups:
    - name: Default Mock group
      type: mock
      endpoints:
        - name: Default Mock endpoint
          type: mock
          inheritConfiguration: false
          secondary: false
          configuration:
            messageInterval: 1000
            messageContent: '{"message": "hello from mock"}'
            messagesCount: 1
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: "Publish flow"
      enabled: true
      selectors:
        - type: CHANNEL
          channel: "/"
          channelOperator: STARTS_WITH
      publish:
        - name: "Transform Headers"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-Drift-Test"
                value: "message-drift-full"
      subscribe:
        - name: "Transform Headers on subscribe"
          enabled: true
          policy: transform-headers
          configuration:
            addHeaders:
              - name: "X-Drift-Subscribe"
                value: "message-drift-full"
  metadata:
    - key: "build-version"
      name: "build-version"
      format: "STRING"
      value: "0.0.1"
  pages:
    markdowns-folder:
      name: markdowns
      type: FOLDER
      published: true
    markdown:
      name: "hello-markdown"
      type: MARKDOWN
      parent: markdowns-folder
      content: |
        Hello from message API drift test.
      visibility: PUBLIC
      published: true
  plans:
    KeyLess:
      name: "Free plan"
      description: "This plan does not require any authentication"
      security:
        type: "KEY_LESS"
  lifecycleState: PUBLISHED
  notifyMembers: false
