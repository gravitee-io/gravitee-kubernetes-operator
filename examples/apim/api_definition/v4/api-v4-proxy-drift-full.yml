apiVersion: gravitee.io/v1alpha1
kind: ApiV4Definition
metadata:
  name: api-v4-proxy-drift-full
spec:
  contextRef:
    name: "dev-ctx"
  name: "api-v4-proxy-drift-full"
  description: "V4 Proxy API with extended fields for drift admission tests"
  version: "1.0"
  type: PROXY
  state: STARTED
  properties:
    - key: owner
      value: gko
  listeners:
    - type: HTTP
      paths:
        - path: "/api-v4-proxy-drift-full"
      entrypoints:
        - type: http-proxy
          qos: AUTO
  endpointGroups:
    - name: Default HTTP proxy group
      type: http-proxy
      endpoints:
        - name: Default HTTP proxy
          type: http-proxy
          inheritConfiguration: false
          configuration:
            target: https://api.gravitee.io/echo
          secondary: false
  flowExecution:
    mode: DEFAULT
    matchRequired: false
  flows:
    - name: default
      enabled: true
      selectors:
        - type: HTTP
          path: "/"
          pathOperator: EQUALS
          methods: []
      request:
        - name: Rate Limit
          description: k8s rate limit
          enabled: true
          policy: rate-limit
          configuration:
            async: false
            addHeaders: true
            rate:
              useKeyOnly: false
              periodTime: 100
              limit: 10000
              periodTimeUnit: MINUTES
              key: ""
      response:
        - name: SPG
          description: SPG
          enabled: true
          policy: shared-policy-group
          sharedPolicyGroupRef:
            name: "simple-shared-policy-groups"
  metadata:
    - key: "build-version"
      name: "build-version"
      format: "STRING"
      value: "0.0.1"
  pages:
    markdowns-folder:
      name: markdowns
      type: FOLDER
      published: true
    markdown:
      name: "hello-markdown"
      type: MARKDOWN
      parent: markdowns-folder
      content: |
        Hello from proxy API drift test.
      visibility: PUBLIC
      published: true
  plans:
    KeyLess:
      name: "Free plan"
      description: "This plan does not require any authentication"
      security:
        type: "KEY_LESS"
      flows:
        - name: default
          enabled: true
          selectors:
            - type: HTTP
              path: "/"
              pathOperator: EQUALS
              methods: [ ]
          request:
            - name: Rate Limit
              description: k8s rate limit
              enabled: true
              policy: rate-limit
              configuration:
                async: false
                addHeaders: true
                rate:
                  useKeyOnly: false
                  periodTime: 100
                  limit: 10000
                  periodTimeUnit: MINUTES
                  key: ""
  lifecycleState: PUBLISHED
  notifyMembers: false
  groups:
    - product
  groupRefs:
    - name: developers
  notificationsRefs:
    - name: api-notification-groups
  resources:
    - ref:
        name: reusable-resource-cache-redis
